# Railway deployment configuration for DeepSearch Backend
# Docs: https://docs.railway.app/reference/config-as-code

[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
preDeployCommand = "sh -c 'alembic upgrade head'"
startCommand = "sh -c 'uvicorn src.main:app --host 0.0.0.0 --port ${PORT:-8000} --log-level info'"
healthcheckPath = "/health"
healthcheckTimeout = 60
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3

# Required environment variables (set these in Railway dashboard):
# DATABASE_URL        — automatically provided by Railway PostgreSQL service
# ENVIRONMENT         — production | staging | development  (no auth needed)
# CORS_ORIGINS        — JSON array, e.g. ["https://example.com"]
# CRM_ADAPTER_CLASS   — (optional) dotted path to CRM adapter
# CRM_API_KEY         — (optional) CRM provider API key
# LOG_LEVEL           — INFO (default) | DEBUG | WARNING | ERROR
#
# Required in PRODUCTION (startup fails fast if any is missing):
# BOOKING_EVENT_URL        — cal.eu event URL, e.g. https://cal.eu/sma-sam-hxsd97/30min
# RESEND_API_KEY           — Resend API key for transactional emails
# EMAIL_FROM_ADDRESS       — verified sender (or onboarding@resend.dev for testing)
# INSIDE_NOTIFICATION_EMAIL — Commercial Team inbox for Operator Notifications
