services:
  api:
    build: .
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      - PORT=8000
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: deepsearch
      POSTGRES_USER: deepsearch
      POSTGRES_PASSWORD: deepsearch
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U deepsearch -d deepsearch"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  postgres_data:
